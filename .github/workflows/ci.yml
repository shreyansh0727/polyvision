name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-typecheck:
    name: Lint & TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: |
          echo "node-linker=hoisted" >> .npmrc
          npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: ESLint
        run: npx eslint "src/**/*.{ts,tsx}" --max-warnings 0

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: |
          echo "node-linker=hoisted" >> .npmrc
          npm ci
      - name: Run tests
        run: npx jest --passWithNoTests --ci --coverage --coverageReporters=text-summary

  android-build-check:
    name: Android Debug Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: |
          echo "node-linker=hoisted" >> .npmrc
          npm ci
      - name: Verify RN gradle plugin
        run: |
          if [ ! -f "node_modules/@react-native/gradle-plugin/build.gradle.kts" ]; then
            echo "ERROR: RN gradle plugin missing!"
            exit 1
          fi
          echo "✅ RN gradle plugin found"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Create .env file
        run: |
          echo "API_URL=https://vns-track.de.r.appspot.com" > .env
          echo "GOOGLE_MAPS_API_KEY=dummy_ci_key" >> .env
      - name: Make gradlew executable
        run: chmod +x android/gradlew
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-
      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon --quiet
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-ci-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
