name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-apk:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          echo "node-linker=hoisted" >> .npmrc
          npm ci

      - name: Verify RN gradle plugin
        run: |
          if [ ! -f "node_modules/@react-native/gradle-plugin/build.gradle.kts" ]; then
            echo "ERROR: RN gradle plugin missing!"
            exit 1
          fi
          echo "✅ RN gradle plugin found"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Create .env file
        run: |
          echo "GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}" > .env
          echo "API_URL=${{ secrets.API_URL }}" >> .env

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Build signed APK
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Create GitHub Release with APK
        id: gh_release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          name: Release ${{ github.ref_name }}
          generate_release_notes: true

      # ─────────────────────────────────────────────────────────────
      # NEW: Update backend /ota/app/version for internal updates
      # ─────────────────────────────────────────────────────────────
      - name: Update backend app version metadata
        env:
          OTA_APP_VERSION_URL: ${{ secrets.OTA_APP_VERSION_URL }} 
          OTA_SECRET:          ${{ secrets.OTA_SECRET }}
        run: |
          TAG="${GITHUB_REF_NAME}"              # e.g. v1.3.0
          VERSION="${TAG#v}"                    # strip 'v' prefix -> 1.3.0
          APK_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/app-release.apk"

          echo "Resolved version: ${VERSION}"
          echo "APK URL: ${APK_URL}"

          # Optional: set a min supported version (or leave null)
          MIN_SUPPORTED_VERSION="null"
          NOTES="Internal release ${VERSION} (tag ${TAG})"

          # Build JSON payload
          TMP_PAYLOAD_FILE=app_version_payload.json
          cat > "$TMP_PAYLOAD_FILE" << JSON
          {
            "latestVersion": "${VERSION}",
            "minSupportedVersion": ${MIN_SUPPORTED_VERSION:+\"$MIN_SUPPORTED_VERSION\"},
            "apkUrl": "${APK_URL}",
            "notes": "${NOTES}"
          }
          JSON

          echo "Payload:"
          cat "$TMP_PAYLOAD_FILE"

          HTTP_STATUS=$(curl -s -o /tmp/app_version_response.txt -w "%{http_code}" \
            -X PUT "$OTA_APP_VERSION_URL" \
            -H "Authorization: Bearer $OTA_SECRET" \
            -H "Content-Type: application/json" \
            --data-binary "@$TMP_PAYLOAD_FILE")

          echo "Server response:"
          cat /tmp/app_version_response.txt
          echo "HTTP status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "❌ Failed to update /ota/app/version (HTTP $HTTP_STATUS)"
            exit 1
          fi

          echo "✅ /ota/app/version updated to v${VERSION}"