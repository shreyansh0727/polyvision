buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 24
        compileSdkVersion = 35
        targetSdkVersion = 34
        ndkVersion = "26.1.10909125"
        kotlinVersion = "1.9.25"
    }
    repositories {
        google()
        mavenCentral()
    }
    configurations.all {
        resolutionStrategy {
            force "com.android.tools.build:gradle:8.3.2"
        }
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.3.2")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:${kotlinVersion}")
        classpath 'com.google.gms:google-services:4.4.1'
    }
}

allprojects {
    configurations.all {
        resolutionStrategy {
            force "androidx.core:core:1.12.0"
            force "androidx.core:core-ktx:1.12.0"
        }
    }
}

// ✅ Fix: React Native native modules have no variants declared.
// This tells Gradle to fall back to 'debug' when 'release' variant
// is not found — fixes "No matching variant" error on Gradle 8.7+
subprojects { subproject ->
    afterEvaluate {
        if (subproject.plugins.hasPlugin("com.android.library")) {
            try {
                subproject.android.buildTypes {
                    release { matchingFallbacks = ['release', 'debug'] }
                    debug   { matchingFallbacks = ['debug',   'release'] }
                }
            } catch (Exception ignored) {}
        }
    }
}

apply plugin: "com.facebook.react.rootproject"